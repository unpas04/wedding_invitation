<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP 관리자</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
        }

        .login-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 48px 40px;
            width: 320px;
        }

        .login-box h2 {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 2px;
            margin-bottom: 32px;
            color: #1a1a1a;
        }

        .login-box input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            font-size: 14px;
            margin-bottom: 14px;
            outline: none;
        }

        .login-box input:focus { border-color: #1a1a1a; }

        .login-box button {
            width: 100%;
            padding: 13px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .login-error {
            font-size: 12px;
            color: #e53935;
            margin-top: 10px;
            text-align: center;
        }

        /* 어드민 */
        .admin-wrap { display: none; padding: 40px 24px; max-width: 900px; margin: 0 auto; }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .admin-header h1 {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .admin-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 9px 18px;
            font-size: 11px;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: 1px solid #1a1a1a;
            background: transparent;
            color: #1a1a1a;
            transition: all 0.2s;
        }

        .btn:hover, .btn.active {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-csv {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-csv:hover { background: #333; }

        /* 통계 */
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 20px 24px;
            flex: 1;
            min-width: 120px;
        }

        .stat-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 300;
            color: #1a1a1a;
        }

        /* 테이블 */
        .table-wrap {
            background: #fff;
            border: 1px solid #e0e0e0;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            padding: 14px 16px;
            font-size: 10px;
            letter-spacing: 2px;
            color: #888;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
            font-weight: 400;
        }

        td {
            padding: 14px 16px;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
            color: #1a1a1a;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            font-size: 10px;
            letter-spacing: 1px;
            border-radius: 20px;
        }

        .badge-yes { background: #e8f5e9; color: #2e7d32; }
        .badge-no  { background: #fce4ec; color: #c62828; }

        .empty {
            text-align: center;
            padding: 60px;
            color: #aaa;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #aaa;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
    <div class="login-box">
        <h2>RSVP ADMIN</h2>
        <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter') login()">
        <button onclick="login()">로그인</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- 어드민 -->
<div class="admin-wrap" id="adminWrap">
    <div class="admin-header">
        <h1>RSVP 현황</h1>
        <div class="admin-actions">
            <button class="btn active" id="btnAll" onclick="filterData('all')">전체</button>
            <button class="btn" id="btnYes" onclick="filterData('참석')">참석</button>
            <button class="btn" id="btnNo" onclick="filterData('불참')">불참</button>
            <button class="btn btn-csv" onclick="downloadCSV()">CSV 다운로드</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">전체 응답</div>
            <div class="stat-value" id="statTotal">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">참석</div>
            <div class="stat-value" id="statYes">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">불참</div>
            <div class="stat-value" id="statNo">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">총 참석 인원</div>
            <div class="stat-value" id="statCount">-</div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>이름</th>
                    <th>참석 여부</th>
                    <th>인원</th>
                    <th>메시지</th>
                    <th>제출 시간</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" class="loading">불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const PASSWORD = 'weddingadmin2026';

    function login() {
        const pw = document.getElementById('pwInput').value;
        if (pw === PASSWORD) {
            document.getElementById('loginWrap').style.display = 'none';
            document.getElementById('adminWrap').style.display = 'block';
            loadData();
        } else {
            document.getElementById('loginError').textContent = '비밀번호가 올바르지 않습니다.';
        }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBNev4wKaiCpyvl5ZtzyrpIkgUd70pVD5A",
        authDomain: "wedding-invitation-2a943.firebaseapp.com",
        projectId: "wedding-invitation-2a943",
        storageBucket: "wedding-invitation-2a943.firebasestorage.app",
        messagingSenderId: "587881140813",
        appId: "1:587881140813:web:df9240c82b633c7a0e4204",
        measurementId: "G-VM3PP6YQS4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allData = [];
    let currentFilter = 'all';

    window.loadData = async () => {
        try {
            const q = query(collection(db, 'rsvp'), orderBy('createdAt', 'desc'));
            const snap = await getDocs(q);
            allData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderStats();
            renderTable(allData);
        } catch (e) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="empty">데이터를 불러오지 못했습니다.</td></tr>';
        }
    };

    function renderStats() {
        const yes = allData.filter(d => d.attend === '참석');
        const no  = allData.filter(d => d.attend === '불참');
        const totalCount = yes.reduce((sum, d) => sum + (Number(d.count) || 0), 0);
        document.getElementById('statTotal').textContent = allData.length;
        document.getElementById('statYes').textContent = yes.length;
        document.getElementById('statNo').textContent = no.length;
        document.getElementById('statCount').textContent = totalCount + '명';
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">데이터가 없습니다.</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(d => {
            const date = d.createdAt?.toDate?.() ?? null;
            const dateStr = date ? date.toLocaleString('ko-KR') : '-';
            const badge = d.attend === '참석'
                ? '<span class="badge badge-yes">참석</span>'
                : '<span class="badge badge-no">불참</span>';
            return `<tr>
                <td>${d.name || '-'}</td>
                <td>${badge}</td>
                <td>${d.count || '-'}명</td>
                <td>${d.message || '-'}</td>
                <td>${dateStr}</td>
            </tr>`;
        }).join('');
    }

    window.filterData = (filter) => {
        currentFilter = filter;
        ['All','Yes','No'].forEach(k => document.getElementById('btn'+k).classList.remove('active'));
        document.getElementById('btn' + filter.charAt(0).toUpperCase() + filter.slice(1) === 'Btn' ? filter : (filter === 'all' ? 'All' : filter === '참석' ? 'Yes' : 'No')).classList.add('active');

        const filtered = filter === 'all' ? allData : allData.filter(d => d.attend === filter);
        renderTable(filtered);
    };

    window.downloadCSV = () => {
        const filtered = currentFilter === 'all' ? allData : allData.filter(d => d.attend === currentFilter);
        const header = ['이름', '참석여부', '인원', '메시지', '제출시간'];
        const rows = filtered.map(d => {
            const date = d.createdAt?.toDate?.() ?? null;
            const dateStr = date ? date.toLocaleString('ko-KR') : '-';
            return [d.name, d.attend, d.count, d.message || '', dateStr].map(v => `"${v}"`).join(',');
        });
        const csv = '﻿' + [header.join(','), ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `rsvp_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
    };
</script>

</body>
</html>
